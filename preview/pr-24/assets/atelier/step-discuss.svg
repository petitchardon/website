<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-hidden="true" fill="none">
  <!-- pinned proof sheet with feedback marks -->
  <g transform="rotate(-3 100 100)">
    <rect x="44" y="40" width="112" height="130" rx="8" fill="#0f0e54" transform="translate(6 6)"/>
    <rect x="44" y="40" width="112" height="130" rx="8" fill="#f7f7ff"/>
    <rect x="60" y="62" width="58" height="40" rx="6" fill="#27ccbc"/>
    <rect x="60" y="116" width="80" height="10" rx="5" fill="#0f0e54"/>
    <rect x="60" y="134" width="62" height="10" rx="5" fill="#bff7e9"/>
    <!-- citron circled feedback -->
    <ellipse cx="120" cy="80" rx="26" ry="20" fill="none" stroke="#d9f20c" stroke-width="5" transform="rotate(-10 120 80)"/>
    <path d="M132 150 l14 -10 l-2 16 Z" fill="#d9f20c"/>
  </g>
  <!-- push pin -->
  <circle cx="100" cy="44" r="13" fill="#d9f20c"/>
  <circle cx="100" cy="44" r="13" fill="none" stroke="#0f0e54" stroke-width="4"/>
  <circle cx="96" cy="40" r="4" fill="#f7f7ff"/>
</svg>
