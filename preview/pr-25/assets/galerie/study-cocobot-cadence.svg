    <g transform="translate(240 300)"><circle r="16" fill="#bff7e9"/></g>
    <g transform="translate(370 300)"><circle r="26" fill="#d9f20c"/><line x1="0" y1="26" x2="0" y2="84" stroke="#27ccbc" stroke-width="2" opacity="0.5"/><text x="0" y="104" text-anchor="middle" fill="#bff7e9" font-family="Inter, system-ui, sans-serif" font-size="13">mer</text></g>
    <g transform="translate(500 300)"><circle r="16" fill="#bff7e9"/></g>
    <g transform="translate(630 300)"><circle r="22" fill="#27ccbc"/><line x1="0" y1="-22" x2="0" y2="-80" stroke="#27ccbc" stroke-width="2" opacity="0.5"/><text x="0" y="-92" text-anchor="middle" fill="#bff7e9" font-family="Inter, system-ui, sans-serif" font-size="13">ven</text></g>
  </g>
  <text x="400" y="500" text-anchor="middle" fill="#bff7e9" font-family="Inter, system-ui, sans-serif" font-size="16" letter-spacing="8">CALENDRIER ÉDITORIAL</text>
