      <circle cx="2" cy="2" r="2" fill="#0f0e54" opacity="0.16"/>
    </pattern>
  </defs>
  <rect width="400" height="320" fill="#fffdf6"/>
  <!-- citron field, offset -->
  <path d="M40 220c40-120 120-150 200-120s100 130 60 180-260 60-260-60Z" fill="#d9f20c"/>
  <path d="M46 226c40-120 120-150 200-120s100 130 60 180-260 60-260-60Z" fill="#d9f20c" opacity="0.5" style="mix-blend-mode:multiply"/>
  <rect width="400" height="320" fill="url(#ia-dots)"/>
  <!-- constellation: nodes (atypical minds) connected -->
  <g stroke="#0f0e54" stroke-width="3.5">
