    <circle cx="300" cy="170" r="16"/>
    <circle cx="130" cy="220" r="11"/>
    <circle cx="250" cy="90" r="12"/>
  </g>
  <g fill="#fffdf6" stroke="#0f0e54" stroke-width="4">
    <circle cx="170" cy="140" r="20"/>
    <circle cx="240" cy="250" r="14"/>
    <circle cx="110" cy="200" r="9"/>
    <circle cx="320" cy="250" r="10"/>
  </g>
  <!-- spark inside the hub node -->
  <path d="M170 130v20M160 140h20" stroke="#0f0e54" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M40 40v22M29 51h22" stroke="#0f0e54" stroke-width="2.4"/>
