name: CI

# Validates the static HTML site on every PR and main push.
# Replaced by PR2's Astro-aware ci.yml when that PR merges.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Pinned vnu.jar version. Bump deliberately when we want a fresher
# validator. Releases: https://github.com/validator/validator/releases
env:
  VNU_VERSION: "23.4.11"

jobs:
  validate:
    name: validate static site
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java (for vnu.jar)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install validators
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libxml2-utils
          # W3C Nu HTML Checker — canonical validator from validator/validator,
          # actively released. We download the jar directly because pypi's
          # html5validator 0.4.2 (last release 2021) ships vnu 20.6.30 from
          # 2020 and predates several spec changes (e.g. `media` on
          # <meta name="theme-color">).
          curl -fsSL "https://github.com/validator/validator/releases/download/${VNU_VERSION}/vnu.jar_${VNU_VERSION}.zip" -o vnu.zip
          unzip -q vnu.zip
          mv dist/vnu.jar vnu.jar
          rm -rf vnu.zip dist
          java -jar vnu.jar --version

      - name: JSON syntax (site.webmanifest)
        run: python3 -m json.tool site.webmanifest > /dev/null

      - name: XML syntax (sitemap.xml, favicon.svg)
        run: |
          xmllint --noout sitemap.xml
          xmllint --noout favicon.svg

      - name: JS syntax (js/*.js)
        run: |
          for f in $(find js -name '*.js'); do
            echo "Checking $f"
            node -c "$f"
          done

      - name: HTML5 + SVG validation (W3C Nu)
        run: |
          mapfile -t targets < <(find . -type f \( -name '*.html' -o -name '*.svg' \) \
            -not -path './node_modules/*' \
            -not -path './.git/*' \
            -not -path './.github/*')
          printf 'Validating %d files\n' "${#targets[@]}"
          java -jar vnu.jar --also-check-svg "${targets[@]}"

      - name: Internal link integrity
        uses: lycheeverse/lychee-action@v2
        with:
          args: |
            --no-progress
            --offline
            --include-fragments
            --root-dir ${{ github.workspace }}
            index.html
            projects/*.html
            404.html
          fail: true
