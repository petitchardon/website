name: PR preview cleanup

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
        id: checkout
        continue-on-error: true
        with:
          ref: gh-pages
          fetch-depth: 1

      - name: Skip if gh-pages does not exist yet
        if: steps.checkout.outcome != 'success'
        run: echo "gh-pages branch absent — nothing to clean."

      - name: Remove preview/pr-${{ github.event.number }}
        if: steps.checkout.outcome == 'success'
        run: |
          set -e
          DIR="preview/pr-${{ github.event.number }}"
          if [ ! -d "$DIR" ]; then
            echo "$DIR not found on gh-pages — already cleaned or never deployed."
            exit 0
          fi
          rm -rf "$DIR"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No staged changes — nothing to commit."
            exit 0
          fi
          git commit -m "cleanup: remove $DIR (PR #${{ github.event.number }} closed)"
          git push origin gh-pages
