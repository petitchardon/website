name: Deploy production

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

# Serialize all writes to gh-pages so prod and preview deploys never race.
concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Publish dist/ to gh-pages root (preserve preview/)
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          clean: true
          # Don't wipe the preview/ subtree when refreshing prod files.
          clean-exclude: |
            preview
          commit-message: "deploy: prod ${{ github.sha }}"
