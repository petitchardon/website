<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 520" role="img" aria-hidden="true" fill="none" preserveAspectRatio="xMidYMid meet">
  <defs>
    <pattern id="cv-dots" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="2.2" cy="2.2" r="2.2" fill="#0f0e54" opacity="0.18"/>
    </pattern>
    <pattern id="cv-dots-c" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="translate(5 5)">
      <circle cx="2.2" cy="2.2" r="2.2" fill="#d9f20c" opacity="0.9"/>
    </pattern>
  </defs>
  <!-- big citron printed disc, halftone, offset for misregistration -->
  <circle cx="216" cy="206" r="150" fill="#d9f20c"/>
  <circle cx="210" cy="212" r="150" fill="url(#cv-dots-c)" opacity="0.5"/>
  <!-- chardon (thistle) bloom — indigo line art -->
  <g stroke="#0f0e54" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <!-- stem -->
    <path d="M210 470V250" />
    <!-- leaves -->
    <path d="M210 360c-34-6-58-30-64-66 34 4 58 28 64 66Z" fill="#27ccbc" fill-opacity="0.4"/>
    <path d="M210 392c34-6 58-30 64-66-34 4-58 28-64 66Z" fill="#fffdf6"/>
    <!-- calyx (spiky base) -->
    <path d="M178 232c0 22 14 36 32 36s32-14 32-36c-10 8-22 8-32 0-10 8-22 8-32 0Z" fill="#27ccbc" fill-opacity="0.5"/>
    <path d="M182 240l-8-12M198 232l-4-16M210 230v-18M222 232l4-16M238 240l8-12" />
    <!-- bloom (tufted top) -->
    <g>
      <path d="M210 96v40M186 104l10 36M234 104l-10 36M168 124l20 28M252 124l-20 28M160 152l28 16M260 152l-28 16" />
    </g>
    <circle cx="210" cy="178" r="40" fill="#fffdf6"/>
  </g>
  <circle cx="210" cy="178" r="40" fill="url(#cv-dots)"/>
  <circle cx="210" cy="178" r="40" fill="none" stroke="#0f0e54" stroke-width="5"/>
  <!-- floating registration crosses -->
  <path d="M340 70v26M327 83h26" stroke="#0f0e54" stroke-width="2.6"/>
  <path d="M70 420v26M57 433h26" stroke="#0f0e54" stroke-width="2.6"/>
</svg>
