<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 480" role="img" aria-hidden="true" fill="none">
  <!-- A pinned collage stack: the designer's signature, all cut paper. -->
  <!-- big citron torn sheet -->
  <g transform="rotate(-5 220 240)">
    <path d="M60 70 L360 50 L378 360 Q220 392 70 366 Z" fill="#0f0e54" transform="translate(10 12)"/>
    <path d="M60 70 L360 50 L378 360 Q220 392 70 366 Z" fill="#d9f20c"/>
  </g>
  <!-- teal cut card overlap -->
  <g transform="rotate(6 150 320)">
    <rect x="40" y="250" width="180" height="150" rx="10" fill="#0f0e54" transform="translate(8 8)"/>
    <rect x="40" y="250" width="180" height="150" rx="10" fill="#27ccbc"/>
    <rect x="62" y="278" width="120" height="16" rx="8" fill="#0f0e54"/>
    <rect x="62" y="306" width="140" height="12" rx="6" fill="#bff7e9"/>
    <rect x="62" y="328" width="100" height="12" rx="6" fill="#0f0e54"/>
  </g>
  <!-- indigo paper chardon bloom -->
  <g transform="translate(250 150) rotate(8 70 80)">
    <path d="M70 150 q-8 -40 0 -70" stroke="#0f0e54" stroke-width="8" stroke-linecap="round" fill="none"/>
    <circle cx="70" cy="60" r="34" fill="#0f0e54" transform="translate(6 6)"/>
    <circle cx="70" cy="60" r="34" fill="#f7f7ff"/>
    <g stroke="#0f0e54" stroke-width="5" stroke-linecap="round">
      <line x1="70" y1="60" x2="70" y2="18"/><line x1="70" y1="60" x2="104" y2="36"/>
      <line x1="70" y1="60" x2="112" y2="66"/><line x1="70" y1="60" x2="36" y2="36"/>
      <line x1="70" y1="60" x2="28" y2="66"/><line x1="70" y1="60" x2="100" y2="92"/>
      <line x1="70" y1="60" x2="40" y2="92"/>
    </g>
    <circle cx="70" cy="60" r="15" fill="#27ccbc"/>
    <path d="M70 132 q-30 -8 -40 -28 q28 -2 40 28 Z" fill="#0f0e54"/>
  </g>
  <!-- washi strips -->
  <rect x="120" y="40" width="170" height="34" fill="#27ccbc" opacity="0.85" transform="rotate(-9 205 57)"/>
  <rect x="120" y="40" width="170" height="34" fill="none" stroke="#bff7e9" stroke-width="2.5" stroke-dasharray="3 6" transform="rotate(-9 205 57)"/>
  <rect x="250" y="370" width="150" height="30" fill="#d9f20c" opacity="0.9" transform="rotate(8 325 385)"/>
  <!-- postmark circle stamp -->
  <g transform="translate(330 90) rotate(-12 0 0)">
    <circle r="44" fill="none" stroke="#f7f7ff" stroke-width="4" stroke-dasharray="6 6"/>
    <circle r="32" fill="none" stroke="#f7f7ff" stroke-width="2.5"/>
    <path d="M-22 0 L22 0 M0 -22 L0 22" stroke="#f7f7ff" stroke-width="2.5"/>
  </g>
  <!-- small scraps -->
  <circle cx="60" cy="200" r="20" fill="#bff7e9"/>
  <rect x="360" y="280" width="40" height="40" rx="6" fill="#27ccbc" transform="rotate(16 380 300)"/>
</svg>
