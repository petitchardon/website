<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 640" role="img" aria-hidden="true" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="lk-wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f3f3ff"/>
      <stop offset="1" stop-color="#e3e3f6"/>
    </linearGradient>
    <linearGradient id="lk-cup" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#292881"/>
      <stop offset="1" stop-color="#0f0e54"/>
    </linearGradient>
  </defs>
  <rect width="800" height="640" fill="url(#lk-wall)"/>
  <!-- quiet ground line -->
  <rect x="0" y="470" width="800" height="170" fill="#dededf" opacity="0.5"/>
  <line x1="0" y1="470" x2="800" y2="470" stroke="#27ccbc" stroke-width="2" opacity="0.5"/>
  <!-- iced-coffee glass: a single elegant object, gallery-still -->
  <g transform="translate(400 318)">
    <!-- shadow -->
    <ellipse cx="0" cy="158" rx="118" ry="16" fill="#0f0e54" opacity="0.08"/>
    <!-- glass body -->
    <path d="M-96 -150 L96 -150 L78 150 L-78 150 Z" fill="#ffffff" opacity="0.9"/>
    <path d="M-96 -150 L96 -150 L78 150 L-78 150 Z" fill="none" stroke="#0f0e54" stroke-width="4"/>
    <!-- cold brew fill -->
    <path d="M-90 -36 L90 -36 L78 150 L-78 150 Z" fill="url(#lk-cup)"/>
    <!-- ice cubes -->
    <rect x="-58" y="-26" width="46" height="46" rx="6" fill="#bff7e9" opacity="0.85" transform="rotate(-12 -35 -3)"/>
    <rect x="6" y="-30" width="50" height="50" rx="6" fill="#27ccbc" opacity="0.8" transform="rotate(10 31 -5)"/>
    <rect x="-20" y="14" width="42" height="42" rx="6" fill="#bff7e9" opacity="0.7" transform="rotate(6 1 35)"/>
    <!-- straw -->
    <rect x="34" y="-210" width="12" height="200" rx="6" fill="#d9f20c"/>
    <rect x="34" y="-210" width="12" height="200" rx="6" fill="none" stroke="#0f0e54" stroke-width="2" opacity="0.4"/>
    <!-- condensation dots -->
    <circle cx="-70" cy="60" r="4" fill="#ffffff" opacity="0.7"/>
    <circle cx="64" cy="90" r="3" fill="#ffffff" opacity="0.7"/>
    <circle cx="-50" cy="110" r="3" fill="#ffffff" opacity="0.6"/>
  </g>
  <!-- wordmark caption etched on the wall -->
  <text x="400" y="556" text-anchor="middle" fill="#0f0e54" font-family="Inter, system-ui, sans-serif" font-size="34" font-weight="600" letter-spacing="6">LUKE'S</text>
  <text x="400" y="588" text-anchor="middle" fill="#27ccbc" font-family="Inter, system-ui, sans-serif" font-size="15" letter-spacing="10">ICED COFFEES</text>
</svg>
